name: CI
on:
  pull_request:
  push:
    branches: [main, work]
permissions:
  contents: read
jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: beyond_every_art
          POSTGRES_PASSWORD: payload
          POSTGRES_USER: payload
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U payload -d beyond_every_art"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URI: postgresql://payload:payload@localhost:5432/beyond_every_art
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      PAYLOAD_SECRET: synthetic-ci-secret-that-is-not-used-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { run_install: false }
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      # Switch to --frozen-lockfile as soon as dependency access is available and
      # the initial pnpm-lock.yaml can be generated and reviewed.
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm migrate:ghost --dry-run --input tests/fixtures/ghost-export.json
      - run: pnpm build
