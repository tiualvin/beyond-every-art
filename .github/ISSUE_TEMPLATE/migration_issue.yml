name: Migration issue
description: Report a Ghost import, media, URL, or SEO migration problem.
title: '[Migration]: '
labels: [migration]
body:
  - type: markdown
    attributes:
      value: Never attach real member exports, credentials, or private archives. Use redacted or synthetic data.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Posts, Pages, Authors, Tags, Media, Redirects, SEO, Members]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem and expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction and dry-run output
    validations:
      required: true
