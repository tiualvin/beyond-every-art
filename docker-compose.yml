services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beyond_every_art
      POSTGRES_PASSWORD: payload
      POSTGRES_USER: payload
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d beyond_every_art']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://payload:payload@postgres:5432/beyond_every_art
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3000
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-development-only-change-me}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
